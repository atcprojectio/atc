version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - gocritic
    - errname
  exclusions:
    paths:
      - ^frontend/.*
      - ^node_modules/.*
    rules:
      - linters:
          - errcheck
        text: "Error return value of"
      - linters:
          - govet
        text: "reflect.Ptr should be inlined"
