apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "atc.fullname" . }}
  labels:
    {{- include "atc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "atc.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "atc.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "atc.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "server"
            - "--config"
            - "/etc/atc/atc-config.yaml"
          ports:
            - name: http
              containerPort: 8088
              protocol: TCP
            - name: metrics
              containerPort: 8089
              protocol: TCP
            - name: mcp
              containerPort: 8092
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: ATC_PORT
              value: "8088"
            - name: ATC_METRICS_PORT
              value: "8089"
            - name: ATC_MCP_PORT
              value: "8092"
            - name: ATC_CONSUL_ADDR
              value: {{ .Values.config.consulAddr | quote }}
            - name: ATC_CONSUL_DC
              value: {{ .Values.config.consulDC | quote }}
            - name: ATC_CONSUL_NAMESPACE
              value: {{ .Values.config.consulNamespace | quote }}
            - name: ATC_WRITE_RATE_LIMIT
              value: {{ .Values.config.writeRateLimit | quote }}
            - name: ATC_LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
          volumeMounts:
            - name: config-volume
              mountPath: /etc/atc
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "atc.fullname" . }}-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
