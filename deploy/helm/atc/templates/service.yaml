apiVersion: v1
kind: Service
metadata:
  name: {{ include "atc.fullname" . }}
  labels:
    {{- include "atc.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "atc.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "atc.fullname" . }}-metrics
  labels:
    {{- include "atc.labels" . | nindent 4 }}
    prometheus.io/scrape: "true"
    prometheus.io/port: "8089"
spec:
  type: {{ .Values.metricsService.type }}
  ports:
    - port: {{ .Values.metricsService.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "atc.selectorLabels" . | nindent 4 }}
