name: Build Documentation

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Docs Artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-artifact
          path: ./docs
          retention-days: 1
