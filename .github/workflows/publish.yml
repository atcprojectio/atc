name: publish artifacts for tag
on:
  push:
    tags:
      - '*'
permissions:
  contents: write
  packages: write
jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      DOCKER_CLI_EXPERIMENTAL: "enabled"
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Docker Login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.ORGANIZATION_BREW_CLIENT_ID }}
          private-key: ${{ secrets.ORGANIZATION_BREW_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "homebrew-tap"
      - uses: anchore/sbom-action@v0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Build Frontend
        run: make build-frontend
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Install Helm
        uses: azure/setup-helm@v5
      - name: Package and Push Helm Chart to GHCR (OCI)
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm package deploy/helm/atc --version "${GITHUB_REF_NAME#v}" --app-version "${GITHUB_REF_NAME}"
          helm push "atc-${GITHUB_REF_NAME#v}.tgz" "oci://ghcr.io/${OWNER}/charts"

